<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Status Update — Divergenti</title>
<script>
(function() {
  var urls = [
    'https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js',
    'https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundled.js',
    'https://unpkg.com/pptxgenjs@3.12.0/dist/pptxgen.bundled.js'
  ];
  var idx = 0;
  function tryNext() {
    if (idx >= urls.length) return;
    var s = document.createElement('script');
    s.src = urls[idx++];
    s.onerror = function() { tryNext(); };
    document.head.appendChild(s);
  }
  tryNext();
})();
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1E2761; --ice: #CADCFC; --bg: #F4F6FB;
    --surface: #FFFFFF; --border: #E2E8F4; --text: #1a1f36;
    --muted: #6b7280; --green: #22c55e; --yellow: #eab308;
    --red: #ef4444; --accent: #3b5bdb;
  }
  html, body { font-family: 'DM Sans', sans-serif; background: var(--bg); height: 100vh; overflow: hidden; display: flex; flex-direction: column; color: var(--text); }
  header { background: var(--navy); color: white; padding: 16px 32px; display: flex; align-items: center; gap: 16px; border-bottom: 3px solid var(--ice); flex-shrink: 0; }
  .logo-mark { width: 36px; height: 36px; background: var(--ice); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: var(--navy); }
  header h1 { font-size: 16px; font-weight: 600; }
  header span { font-size: 12px; color: var(--ice); font-family: 'DM Mono', monospace; margin-left: auto; }
  .progress-bar { background: var(--navy); padding: 0 32px 14px; display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .step-dot { height: 4px; flex: 1; background: rgba(202,220,252,0.3); border-radius: 2px; transition: background 0.4s; }
  .step-dot.active { background: var(--ice); }
  .step-dot.done { background: var(--green); }
  .step-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ice); white-space: nowrap; margin-left: 8px; }
  main { flex: 1; min-height: 0; display: grid; grid-template-columns: 260px 1fr; overflow: hidden; }
  aside { background: var(--surface); border-right: 1px solid var(--border); padding: 24px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  .aside-title { font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .section-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; font-size: 13px; color: var(--muted); }
  .section-item.active { background: #EEF2FF; color: var(--accent); font-weight: 600; }
  .section-item.done { color: var(--green); }
  .section-item .icon { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; background: var(--border); flex-shrink: 0; }
  .section-item.active .icon { background: var(--accent); color: white; }
  .section-item.done .icon { background: var(--green); color: white; }
  .chat-container { display: flex; flex-direction: column; overflow: hidden; height: 100%; min-height: 0; }
  .messages { flex: 1; overflow-y: auto; padding: 28px 32px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
  .bubble { max-width: 76%; padding: 14px 18px; border-radius: 16px; font-size: 14px; line-height: 1.6; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .bubble.ai { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; align-self: flex-start; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .bubble.ai .sender { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--accent); font-weight: 500; margin-bottom: 6px; letter-spacing: 0.5px; }
  .bubble.user { background: var(--navy); color: white; border-bottom-right-radius: 4px; align-self: flex-end; }
  .quick-replies { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 32px 12px; flex-shrink: 0; }
  .sem-btn { padding: 7px 16px; border-radius: 20px; border: 2px solid var(--border); background: white; font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .sem-btn.sel-green { border-color: var(--green); background: #f0fdf4; color: #15803d; font-weight: 600; }
  .sem-btn.sel-yellow { border-color: var(--yellow); background: #fefce8; color: #854d0e; font-weight: 600; }
  .sem-btn.sel-red { border-color: var(--red); background: #fef2f2; color: #991b1b; font-weight: 600; }
  .input-area { padding: 16px 32px 20px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
  textarea { flex: 1; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 14px; font-family: 'DM Sans', sans-serif; resize: none; outline: none; line-height: 1.5; min-height: 46px; max-height: 120px; transition: border-color 0.2s; background: var(--bg); }
  textarea:focus { border-color: var(--accent); background: white; }
  .send-btn { width: 46px; height: 46px; border-radius: 12px; background: var(--navy); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; flex-shrink: 0; }
  .send-btn:hover { background: var(--accent); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }
  .mic-btn { width: 46px; height: 46px; border-radius: 12px; background: var(--bg); border: 1.5px solid var(--border); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .mic-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mic-btn.recording { background: #fef2f2; border-color: var(--red); color: var(--red); animation: micPulse 1.2s infinite; }
  .mic-btn.no-support { opacity: 0.35; cursor: not-allowed; }
  @keyframes micPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.3); } 50% { box-shadow: 0 0 0 6px rgba(239,68,68,0); } }
  .mic-toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--red); color: white; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 500; display: none; align-items: center; gap: 8px; z-index: 100; }
  .mic-toast.show { display: flex; }
  .mic-dot { width: 8px; height: 8px; background: white; border-radius: 50%; animation: micPulse 1s infinite; }
  .download-bar { display: none; padding: 16px 32px 20px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
  .dl-progress { display: none; margin-bottom: 12px; }
  .dl-track { background: var(--border); border-radius: 6px; height: 8px; overflow: hidden; }
  .dl-fill { height: 100%; width: 0%; background: var(--navy); border-radius: 6px; transition: width 0.4s ease; }
  .dl-lbl { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .dl-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .dl-info h3 { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .dl-info p { font-size: 12px; color: var(--muted); }
  .dl-btn { margin-left: auto; padding: 12px 24px; border-radius: 10px; background: var(--navy); color: white; font-weight: 600; font-size: 14px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; flex-shrink: 0; transition: background 0.2s; }
  .dl-btn:hover { background: var(--accent); }
  .dl-btn:disabled { background: var(--border); cursor: not-allowed; }
  .dl-error { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }
  .typing { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
  .typing span { width: 7px; height: 7px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
</style>
</head>
<body>

<header>
  <div class="logo-mark">DV</div>
  <h1>Weekly Status Update</h1>
  <span id="weekLabel">W— / 2025</span>
</header>

<div class="progress-bar">
  <div class="step-dot" id="dot0"></div>
  <div class="step-dot" id="dot1"></div>
  <div class="step-dot" id="dot2"></div>
  <div class="step-dot" id="dot3"></div>
  <span class="step-label" id="stepLabel">Inizia</span>
</div>

<main>
  <aside>
    <div class="aside-title">Sezioni</div>
    <div class="section-item" id="nav0"><div class="icon">0</div> Contesto Progetto</div>
    <div class="section-item" id="nav1"><div class="icon">1</div> Stato Settimanale</div>
    <div class="section-item" id="nav2"><div class="icon">2</div> Attività</div>
    <div class="section-item" id="nav3"><div class="icon">3</div> Criticità &amp; Miglioramenti</div>
  </aside>

  <div class="chat-container">
    <div class="messages" id="messages"></div>
    <div class="quick-replies" id="quickReplies"></div>

    <div class="input-area" id="inputArea">
      <textarea id="userInput" placeholder="Scrivi qui..." rows="1"></textarea>
      <button class="mic-btn" id="micBtn" title="Microfono">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M19 10a7 7 0 0 1-14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="9" y1="22" x2="15" y2="22"/>
        </svg>
      </button>
      <button class="send-btn" id="sendBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>

    <div class="download-bar" id="downloadBar">
      <div class="dl-progress" id="dlProgress">
        <div class="dl-track"><div class="dl-fill" id="dlFill"></div></div>
        <div class="dl-lbl" id="dlLbl">Preparazione…</div>
      </div>
      <div class="dl-row">
        <div class="dl-info">
          <h3 id="dlTitle">Presentazione pronta!</h3>
          <p id="dlSub">Clicca per generare e scaricare il file PPTX.</p>
        </div>
        <button class="dl-btn" id="dlBtn">⬇ Scarica PPTX</button>
      </div>
      <div class="dl-error" id="dlError"></div>
    </div>

    <div class="mic-toast" id="micToast">
      <div class="mic-dot"></div> In ascolto… parla ora
    </div>
  </div>
</main>

<script>
var appData = {
  nomeProgetto:'', responsabile:'', descrizioneProgetto:'',
  obiettivi:'', teamMembers:'', settimana:'', dataOggi:'',
  noteAvanzamento:'', semaforoAvanzamento:'',
  noteRischi:'', semaforoRischi:'',
  noteCliente:'', semaforoCliente:'',
  noteBudget:'', semaforoBudget:'',
  attivitaCompletate:'', attivitaProssima:'',
  areeMiglioramento:'', criticita:''
};

var STEPS = [
  { slide:0, ask:'Ciao! Sono qui per aiutarti a compilare il <b>Weekly Status Update</b>.<br><br>Iniziamo dalla <b>Slide 0 — Contesto Progetto</b>.<br><br>Come si chiama il progetto?' },
  { slide:0, field:'nomeProgetto',        ask:'Perfetto! Chi è il <b>responsabile di progetto</b>?' },
  { slide:0, field:'responsabile',        ask:'Ottimo. Dammi una <b>breve descrizione del progetto</b>.' },
  { slide:0, field:'descrizioneProgetto', ask:'Quali sono i <b>principali obiettivi</b>? Puoi elencarli separati da virgola o a capo.' },
  { slide:0, field:'obiettivi',           ask:'Chi compone il <b>team</b>? Elenca i nomi separati da virgola.' },
  { slide:1, field:'teamMembers',         ask:'Il contesto è completo! 🎉<br><br>Passiamo alla <b>Slide 1 — Stato Settimanale</b>.<br><br>Che settimana stiamo aggiornando? (es. W14 / 2025)' },
  { slide:1, field:'settimana',           ask:'Qual è la <b>data di oggi</b>? (es. 04/04/2025)' },
  { slide:1, field:'dataOggi',            ask:"Come va l'<b>Avanzamento</b> del progetto? Scegli il semaforo e scrivi una nota.", semaforo:'avanzamento' },
  { slide:1, field:'noteAvanzamento',     ask:'Stato <b>Rischi e Criticità</b>: semaforo e nota.', semaforo:'rischi' },
  { slide:1, field:'noteRischi',          ask:'Stato <b>Relazione Cliente</b>: semaforo e nota.', semaforo:'cliente' },
  { slide:1, field:'noteCliente',         ask:'Stato <b>Budget / Ore</b>: semaforo e nota.', semaforo:'budget' },
  { slide:2, field:'noteBudget',          ask:'Ottimo! Ora la <b>Slide 2 — Attività</b>.<br><br>Quali attività sono state <b>completate questa settimana</b>?' },
  { slide:2, field:'attivitaCompletate',  ask:'E quali sono le attività <b>in programma per la prossima settimana</b>?' },
  { slide:3, field:'attivitaProssima',    ask:'Ultima slide! <b>Slide 3 — Criticità e Miglioramenti</b>.<br><br>Ci sono <b>aree di miglioramento</b> emerse questa settimana?' },
  { slide:3, field:'areeMiglioramento',   ask:'Infine, ci sono <b>criticità o blocchi</b> da segnalare?' },
  { slide:3, field:'criticita',           isDone:true }
];

var SEM_FIELDS = { avanzamento:'semaforoAvanzamento', rischi:'semaforoRischi', cliente:'semaforoCliente', budget:'semaforoBudget' };
var stepIdx = 0;
var semValues = {};
var recognition = null;
var isRecording = false;

window.addEventListener('DOMContentLoaded', function() {
  var now = new Date();
  var start = new Date(now.getFullYear(), 0, 1);
  var wk = Math.ceil(((now - start) / 86400000 + start.getDay() + 1) / 7);
  document.getElementById('weekLabel').textContent = 'W' + wk + ' / ' + now.getFullYear();

  document.getElementById('sendBtn').addEventListener('click', sendMessage);
  document.getElementById('micBtn').addEventListener('click', toggleMic);
  document.getElementById('dlBtn').addEventListener('click', downloadPptx);
  document.getElementById('userInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  document.getElementById('userInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  showStep(0);
});

function addBubble(html, type) {
  type = type || 'ai';
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'bubble ' + type;
  if (type === 'ai') {
    div.innerHTML = '<div class="sender">ASSISTENTE</div>' + html;
  } else {
    div.textContent = html;
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'bubble ai';
  div.id = 'typingBubble';
  div.innerHTML = '<div class="sender">ASSISTENTE</div><div class="typing"><span></span><span></span><span></span></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  var t = document.getElementById('typingBubble');
  if (t) t.remove();
}

function updateProgress(slide) {
  var labels = ['Contesto', 'Stato Settimanale', 'Attivita', 'Criticita'];
  for (var i = 0; i < 4; i++) {
    document.getElementById('dot' + i).className = 'step-dot' + (i < slide ? ' done' : i === slide ? ' active' : '');
    var nav = document.getElementById('nav' + i);
    nav.className = 'section-item' + (i < slide ? ' done' : i === slide ? ' active' : '');
    nav.querySelector('.icon').textContent = i < slide ? '✓' : String(i);
  }
  document.getElementById('stepLabel').textContent = labels[slide] || '';
}

function showStep(idx) {
  if (idx >= STEPS.length) { showDone(); return; }
  stepIdx = idx;
  var step = STEPS[idx];
  updateProgress(step.slide);
  if (step.isDone) { showDone(); return; }
  setTimeout(function() {
    removeTyping();
    var extra = step.semaforo ? '<br><br>Scegli prima il semaforo, poi scrivi la nota.' : '';
    addBubble(step.ask + extra);
    if (step.semaforo) {
      showSemaforo(step.semaforo);
    } else {
      document.getElementById('quickReplies').innerHTML = '';
    }
  }, 500);
}

function showSemaforo(area) {
  semValues[area] = 'verde';
  var qr = document.getElementById('quickReplies');
  qr.innerHTML = '';
  var opts = [['verde','sel-green','🟢 In linea'],['giallo','sel-yellow','🟡 A rischio'],['rosso','sel-red','🔴 Critico']];
  opts.forEach(function(o) {
    var btn = document.createElement('button');
    btn.className = 'sem-btn';
    btn.textContent = o[2];
    btn.setAttribute('data-area', area);
    btn.setAttribute('data-val', o[0]);
    btn.setAttribute('data-cls', o[1]);
    btn.addEventListener('click', function() {
      semValues[area] = o[0];
      qr.querySelectorAll('.sem-btn').forEach(function(b) { b.className = 'sem-btn'; });
      btn.className = 'sem-btn ' + o[1];
    });
    qr.appendChild(btn);
  });
}

function sendMessage() {
  var input = document.getElementById('userInput');
  var text = input.value.trim();
  if (!text) return;
  addBubble(text, 'user');
  input.value = '';
  input.style.height = 'auto';

  var step = STEPS[stepIdx];
  if (step.field) appData[step.field] = text;
  if (step.semaforo && SEM_FIELDS[step.semaforo]) {
    appData[SEM_FIELDS[step.semaforo]] = semValues[step.semaforo] || 'verde';
  }

  document.getElementById('quickReplies').innerHTML = '';
  showTyping();
  var next = stepIdx + 1;
  setTimeout(function() { showStep(next); }, 800);
}

function showDone() {
  removeTyping();
  addBubble('Perfetto! Ho tutte le informazioni. 🎉<br><br>Clicca <b>Scarica PPTX</b> qui sotto per generare la presentazione.');
  setTimeout(function() {
    document.getElementById('inputArea').style.display = 'none';
    document.getElementById('downloadBar').style.display = 'block';
    document.getElementById('messages').scrollTop = 99999;
  }, 1000);
}

function initSpeech() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { document.getElementById('micBtn').classList.add('no-support'); return false; }
  recognition = new SR();
  recognition.lang = 'it-IT';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.onstart = function() {
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micToast').classList.add('show');
  };
  recognition.onresult = function(e) {
    var t = '';
    for (var i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;
    document.getElementById('userInput').value = t;
  };
  recognition.onend = function() {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micToast').classList.remove('show');
    if (document.getElementById('userInput').value.trim()) setTimeout(sendMessage, 300);
  };
  recognition.onerror = function() {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micToast').classList.remove('show');
  };
  return true;
}

function toggleMic() {
  if (!recognition && !initSpeech()) return;
  if (isRecording) { recognition.stop(); }
  else { document.getElementById('userInput').value = ''; recognition.start(); }
}

function splitList(str) {
  if (!str) return ['—'];
  var res = [];
  var parts = str.split('\n');
  for (var i = 0; i < parts.length; i++) {
    var t = parts[i].replace(/^[-•]\s*/, '').trim();
    if (t) res.push(t);
  }
  if (!res.length) {
    parts = str.split(',');
    for (var j = 0; j < parts.length; j++) {
      var t2 = parts[j].trim();
      if (t2) res.push(t2);
    }
  }
  return res.length ? res : ['—'];
}

async function downloadPptx() {
  if (typeof PptxGenJS === 'undefined') {
    document.getElementById('dlError').textContent = 'Libreria non caricata. Ricarica la pagina e riprova.';
    document.getElementById('dlError').style.display = 'block';
    return;
  }

  var btn   = document.getElementById('dlBtn');
  var prog  = document.getElementById('dlProgress');
  var fill  = document.getElementById('dlFill');
  var lbl   = document.getElementById('dlLbl');
  var title = document.getElementById('dlTitle');
  var sub   = document.getElementById('dlSub');
  var err   = document.getElementById('dlError');

  btn.disabled = true;
  btn.textContent = 'Generazione...';
  err.style.display = 'none';
  prog.style.display = 'block';

  function setP(pct, txt) { fill.style.width = pct + '%'; lbl.textContent = txt; }
  function wait(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

  var d = appData;

  // Split multiline or comma list
  function splitList(str) {
    if (!str) return ['—'];
    var res = [];
    var parts = str.split('\n');
    for (var i = 0; i < parts.length; i++) {
      var t = parts[i].replace(/^[-•]\s*/, '').trim();
      if (t) res.push(t);
    }
    if (!res.length) {
      parts = str.split(',');
      for (var j = 0; j < parts.length; j++) {
        var t2 = parts[j].trim();
        if (t2) res.push(t2);
      }
    }
    return res.length ? res : ['—'];
  }

  // Semaforo helpers
  function semCol(v) {
    if (v === 'rosso') return 'E6342E';
    if (v === 'giallo') return 'E68C00';
    return '2E7D32';
  }
  function semTxt(v) {
    if (v === 'rosso') return 'Critico';
    if (v === 'giallo') return 'A rischio';
    return 'In linea';
  }
  function semDot(v) {
    if (v === 'rosso') return 'E6342E';
    if (v === 'giallo') return 'E68C00';
    return '2E7D32';
  }

  setP(5, 'Avvio...'); await wait(150);

  var pptx = new PptxGenJS();
  pptx.defineLayout({ name:'WIDE', width:13.33, height:7.5 });
  pptx.layout = 'WIDE';

  // Brand palette from Strategic Management Partners template
  var BRAND   = '0C497B';   // blu brand scuro
  var BLUE2   = '1789E6';   // blu chiaro accent
  var LIME    = 'DDE600';   // giallo lime
  var WHITE   = 'FFFFFF';
  var OFFWHITE= 'F5F7FA';
  var LGRAY   = 'E8ECF0';
  var DGRAY   = '4A5568';
  var MUTED   = '94A3B8';
  var BLACK   = '1A202C';

  // Helper: add a thin colored left border bar on a card
  function addCard(slide, x, y, w, h, borderColor) {
    slide.addShape(pptx.ShapeType.rect, { x:x,y:y,w:w,h:h, fill:{color:WHITE}, line:{color:'D1D9E6',pt:1} });
    slide.addShape(pptx.ShapeType.rect, { x:x,y:y,w:0.07,h:h, fill:{color:borderColor}, line:{color:borderColor} });
  }

  // Helper: section label pill
  function addPill(slide, x, y, w, h, text, bg, fg) {
    slide.addShape(pptx.ShapeType.rect, { x:x,y:y,w:w,h:h, fill:{color:bg}, line:{color:bg} });
    slide.addText(text, { x:x,y:y,w:w,h:h, color:fg, fontSize:8, bold:true, fontFace:'Calibri', align:'center', valign:'middle', charSpacing:1.5 });
  }

  // Helper: left sidebar (brand panel)
  function addSidebar(slide, label, sublabel) {
    slide.addShape(pptx.ShapeType.rect, { x:0,y:0,w:2.8,h:7.5, fill:{color:BRAND}, line:{color:BRAND} });
    // Decorative circle (brand element)
    slide.addShape(pptx.ShapeType.ellipse, { x:-0.9,y:1.8,w:3.5,h:3.5, fill:{type:'none'}, line:{color:WHITE,pt:18,transparency:75} });
    slide.addText(label, { x:0.2,y:0.35,w:2.3,h:1.2, color:WHITE, fontSize:20, bold:true, fontFace:'Calibri', wrap:true, valign:'top' });
    if (sublabel) {
      slide.addShape(pptx.ShapeType.rect, { x:0.2,y:1.65,w:2.1,h:0.04, fill:{color:LIME}, line:{color:LIME} });
      slide.addText(sublabel, { x:0.2,y:1.82,w:2.3,h:0.3, color:LIME, fontSize:9, fontFace:'Calibri', charSpacing:1 });
    }
  }

  // Helper: footer
  function addFooter(slide, pageNum) {
    slide.addShape(pptx.ShapeType.rect, { x:0,y:7.3,w:13.33,h:0.2, fill:{color:LGRAY}, line:{color:LGRAY} });
    slide.addText('pag. ' + pageNum, { x:12.5,y:7.3,w:0.7,h:0.2, color:MUTED, fontSize:8, fontFace:'Calibri', align:'right', valign:'middle' });
  }

  // ── SLIDE 0: CONTESTO PROGETTO ─────────────────────────────────────────────
  setP(15, 'Slide contesto...'); await wait(150);

  var s0 = pptx.addSlide();
  s0.background = { color: OFFWHITE };
  addSidebar(s0, 'CONTESTO\nPROGETTO', d.settimana || 'W— / 2025');

  // Info blocks on sidebar
  var sideItems = [
    { label:'PROGETTO', val: d.nomeProgetto || '—' },
    { label:'RESPONSABILE', val: d.responsabile || '—' },
    { label:'DATA', val: d.dataOggi || '—' }
  ];
  var sy = 2.3;
  sideItems.forEach(function(item) {
    s0.addText(item.label, { x:0.2,y:sy,w:2.3,h:0.2, color:LIME, fontSize:7, bold:true, fontFace:'Calibri', charSpacing:2 });
    s0.addText(item.val, { x:0.2,y:sy+0.22,w:2.3,h:0.4, color:WHITE, fontSize:11, fontFace:'Calibri', wrap:true });
    sy += 0.78;
  });

  // Team members
  s0.addText('TEAM', { x:0.2,y:sy+0.1,w:2.3,h:0.2, color:LIME, fontSize:7, bold:true, fontFace:'Calibri', charSpacing:2 });
  var team0 = splitList(d.teamMembers);
  team0.slice(0,5).forEach(function(name, i) {
    s0.addShape(pptx.ShapeType.ellipse, { x:0.22,y:sy+0.42+i*0.38,w:0.14,h:0.14, fill:{color:LIME}, line:{color:LIME} });
    s0.addText(name, { x:0.44,y:sy+0.37+i*0.38,w:2.1,h:0.26, color:WHITE, fontSize:10, fontFace:'Calibri' });
  });

  // Right content
  var rx = 3.1;

  // Header bar
  s0.addShape(pptx.ShapeType.rect, { x:rx,y:0,w:10.23,h:0.08, fill:{color:LIME}, line:{color:LIME} });

  // Descrizione card
  addCard(s0, rx, 0.3, 10.1, 3.0, BLUE2);
  // Icon circle for descrizione
  s0.addShape(pptx.ShapeType.ellipse, { x:rx+0.2,y:0.55,w:0.55,h:0.55, fill:{color:BRAND}, line:{color:BRAND} });
  s0.addText('i', { x:rx+0.2,y:0.55,w:0.55,h:0.55, color:WHITE, fontSize:14, bold:true, fontFace:'Calibri', align:'center', valign:'middle' });
  s0.addText('DESCRIZIONE PROGETTO', { x:rx+0.88,y:0.58,w:9.0,h:0.28, color:BRAND, fontSize:9, bold:true, fontFace:'Calibri', charSpacing:1.5 });
  s0.addShape(pptx.ShapeType.rect, { x:rx+0.88,y:0.92,w:9.0,h:0.02, fill:{color:LGRAY}, line:{color:LGRAY} });
  s0.addText(d.descrizioneProgetto || '—', { x:rx+0.2,y:1.06,w:9.68,h:1.94, color:DGRAY, fontSize:12, fontFace:'Calibri', wrap:true, valign:'top' });

  // Obiettivi card
  addCard(s0, rx, 3.5, 10.1, 3.7, LIME);
  s0.addShape(pptx.ShapeType.ellipse, { x:rx+0.2,y:3.75,w:0.55,h:0.55, fill:{color:BRAND}, line:{color:BRAND} });
  s0.addText('O', { x:rx+0.2,y:3.75,w:0.55,h:0.55, color:WHITE, fontSize:12, bold:true, fontFace:'Calibri', align:'center', valign:'middle' });
  s0.addText('OBIETTIVI', { x:rx+0.88,y:3.78,w:9.0,h:0.28, color:BRAND, fontSize:9, bold:true, fontFace:'Calibri', charSpacing:1.5 });
  s0.addShape(pptx.ShapeType.rect, { x:rx+0.88,y:4.12,w:9.0,h:0.02, fill:{color:LGRAY}, line:{color:LGRAY} });
  var objs = splitList(d.obiettivi);
  var objTxt = objs.map(function(o) { return { text:o, options:{bullet:{type:'bullet'}, color:DGRAY, fontSize:12, fontFace:'Calibri', paraSpaceAfter:6} }; });
  s0.addText(objTxt, { x:rx+0.2,y:4.25,w:9.68,h:2.72, valign:'top', wrap:true });

  addFooter(s0, 1);

  // ── SLIDE 1: STATO SETTIMANALE ─────────────────────────────────────────────
  setP(35, 'Slide stato settimanale...'); await wait(150);

  var s1 = pptx.addSlide();
  s1.background = { color: OFFWHITE };
  addSidebar(s1, 'WEEKLY\nSTATUS\nUPDATE', d.settimana || 'W—');

  // Side info
  var s1items = [
    { label:'PROGETTO', val: d.nomeProgetto || '—' },
    { label:'RESPONSABILE', val: d.responsabile || '—' },
    { label:'DATA', val: d.dataOggi || '—' }
  ];
  var s1y = 2.3;
  s1items.forEach(function(item) {
    s1.addText(item.label, { x:0.2,y:s1y,w:2.3,h:0.2, color:LIME, fontSize:7, bold:true, fontFace:'Calibri', charSpacing:2 });
    s1.addText(item.val, { x:0.2,y:s1y+0.22,w:2.3,h:0.38, color:WHITE, fontSize:11, fontFace:'Calibri', wrap:true });
    s1y += 0.75;
  });

  s1.addShape(pptx.ShapeType.rect, { x:2.8,y:0,w:10.53,h:0.08, fill:{color:LIME}, line:{color:LIME} });

  // 4 status cards (2x2 grid) — with icon circles and semaforo badge
  var statBlocks = [
    { label:'AVANZAMENTO', icon:'A', sem:d.semaforoAvanzamento, note:d.noteAvanzamento },
    { label:'RISCHI', icon:'R', sem:d.semaforoRischi, note:d.noteRischi },
    { label:'RELAZIONE CLIENTE', icon:'C', sem:d.semaforoCliente, note:d.noteCliente },
    { label:'BUDGET / ORE', icon:'B', sem:d.semaforoBudget, note:d.noteBudget }
  ];

  var cols = [3.0, 7.95];
  var rows = [0.25, 3.9];

  statBlocks.forEach(function(b, i) {
    var bx = cols[i % 2];
    var by = rows[Math.floor(i / 2)];
    var bw = 4.7; var bh = 3.4;
    var col = semCol(b.sem);

    // Card
    s1.addShape(pptx.ShapeType.rect, { x:bx,y:by,w:bw,h:bh, fill:{color:WHITE}, line:{color:'D1D9E6',pt:1} });
    // Top accent bar
    s1.addShape(pptx.ShapeType.rect, { x:bx,y:by,w:bw,h:0.08, fill:{color:col}, line:{color:col} });

    // Icon circle
    s1.addShape(pptx.ShapeType.ellipse, { x:bx+0.2,y:by+0.22,w:0.55,h:0.55, fill:{color:BRAND}, line:{color:BRAND} });
    s1.addText(b.icon, { x:bx+0.2,y:by+0.22,w:0.55,h:0.55, color:WHITE, fontSize:13, bold:true, fontFace:'Calibri', align:'center', valign:'middle' });

    // Label
    s1.addText(b.label, { x:bx+0.88,y:by+0.26,w:bw-1.1,h:0.3, color:BRAND, fontSize:9, bold:true, fontFace:'Calibri', charSpacing:1.5 });

    // Status badge
    s1.addShape(pptx.ShapeType.rect, { x:bx+0.88,y:by+0.65,w:1.8,h:0.36, fill:{color:col+'22'}, line:{color:col,pt:1} });
    // Dot
    s1.addShape(pptx.ShapeType.ellipse, { x:bx+0.96,y:by+0.76,w:0.14,h:0.14, fill:{color:col}, line:{color:col} });
    s1.addText(semTxt(b.sem), { x:bx+1.18,y:by+0.65,w:1.5,h:0.36, color:col, fontSize:10, bold:true, fontFace:'Calibri', valign:'middle' });

    // Divider
    s1.addShape(pptx.ShapeType.rect, { x:bx+0.2,y:by+1.18,w:bw-0.4,h:0.02, fill:{color:LGRAY}, line:{color:LGRAY} });

    // Note
    s1.addText(b.note || '—', { x:bx+0.2,y:by+1.3,w:bw-0.4,h:bh-1.5, color:DGRAY, fontSize:11, fontFace:'Calibri', wrap:true, valign:'top' });
  });

  addFooter(s1, 2);

  // ── SLIDE 2: ATTIVITA ──────────────────────────────────────────────────────
  setP(60, 'Slide attivita...'); await wait(150);

  var s2 = pptx.addSlide();
  s2.background = { color: OFFWHITE };
  addSidebar(s2, 'ATTIVITA\nSETTIM.', d.settimana || 'W—');

  s2.addText('PROGETTO', { x:0.2,y:2.5,w:2.3,h:0.2, color:LIME, fontSize:7, bold:true, fontFace:'Calibri', charSpacing:2 });
  s2.addText(d.nomeProgetto||'—', { x:0.2,y:2.72,w:2.3,h:0.5, color:WHITE, fontSize:11, fontFace:'Calibri', wrap:true });

  s2.addShape(pptx.ShapeType.rect, { x:2.8,y:0,w:10.53,h:0.08, fill:{color:LIME}, line:{color:LIME} });

  // LEFT column — Completate
  var lx = 3.0; var lw = 4.8; var cy = 0.2;
  s2.addShape(pptx.ShapeType.rect, { x:lx,y:cy,w:lw,h:7.0, fill:{color:WHITE}, line:{color:'D1D9E6',pt:1} });
  s2.addShape(pptx.ShapeType.rect, { x:lx,y:cy,w:lw,h:0.08, fill:{color:'2E7D32'}, line:{color:'2E7D32'} });
  // Icon
  s2.addShape(pptx.ShapeType.ellipse, { x:lx+0.2,y:cy+0.22,w:0.55,h:0.55, fill:{color:'2E7D32'}, line:{color:'2E7D32'} });
  s2.addText('V', { x:lx+0.2,y:cy+0.22,w:0.55,h:0.55, color:WHITE, fontSize:14, bold:true, fontFace:'Calibri', align:'center', valign:'middle' });
  s2.addText('COMPLETATE QUESTA SETTIMANA', { x:lx+0.88,y:cy+0.27,w:lw-1.1,h:0.3, color:BRAND, fontSize:9, bold:true, fontFace:'Calibri', charSpacing:1 });
  s2.addShape(pptx.ShapeType.rect, { x:lx+0.2,y:cy+0.92,w:lw-0.4,h:0.02, fill:{color:LGRAY}, line:{color:LGRAY} });
  var done2 = splitList(d.attivitaCompletate);
  done2.forEach(function(a, i) {
    var ty = cy + 1.08 + i*0.55;
    if (ty > cy+6.5) return;
    s2.addShape(pptx.ShapeType.ellipse, { x:lx+0.2,y:ty+0.08,w:0.22,h:0.22, fill:{color:'2E7D32'}, line:{color:'2E7D32'} });
    s2.addText(a, { x:lx+0.52,y:ty,w:lw-0.72,h:0.42, color:DGRAY, fontSize:11, fontFace:'Calibri', wrap:true, valign:'top' });
  });

  // RIGHT column — Prossima
  var rx2 = 8.1; var rw = 4.9;
  s2.addShape(pptx.ShapeType.rect, { x:rx2,y:cy,w:rw,h:7.0, fill:{color:WHITE}, line:{color:'D1D9E6',pt:1} });
  s2.addShape(pptx.ShapeType.rect, { x:rx2,y:cy,w:rw,h:0.08, fill:{color:BRAND}, line:{color:BRAND} });
  s2.addShape(pptx.ShapeType.ellipse, { x:rx2+0.2,y:cy+0.22,w:0.55,h:0.55, fill:{color:BRAND}, line:{color:BRAND} });
  s2.addText('>', { x:rx2+0.2,y:cy+0.22,w:0.55,h:0.55, color:WHITE, fontSize:14, bold:true, fontFace:'Calibri', align:'center', valign:'middle' });
  s2.addText('IN PROGRAMMA PROSSIMA SETTIMANA', { x:rx2+0.88,y:cy+0.27,w:rw-1.1,h:0.3, color:BRAND, fontSize:9, bold:true, fontFace:'Calibri', charSpacing:1 });
  s2.addShape(pptx.ShapeType.rect, { x:rx2+0.2,y:cy+0.92,w:rw-0.4,h:0.02, fill:{color:LGRAY}, line:{color:LGRAY} });
  var next2 = splitList(d.attivitaProssima);
  next2.forEach(function(a, i) {
    var ty = cy + 1.08 + i*0.55;
    if (ty > cy+6.5) return;
    s2.addShape(pptx.ShapeType.rect, { x:rx2+0.2,y:ty+0.1,w:0.22,h:0.22, fill:{color:BRAND}, line:{color:BRAND} });
    s2.addText(a, { x:rx2+0.52,y:ty,w:rw-0.72,h:0.42, color:DGRAY, fontSize:11, fontFace:'Calibri', wrap:true, valign:'top' });
  });

  addFooter(s2, 3);

  // ── SLIDE 3: CRITICITA & MIGLIORAMENTI ────────────────────────────────────
  setP(80, 'Slide criticita...'); await wait(150);

  var s3 = pptx.addSlide();
  s3.background = { color: OFFWHITE };
  addSidebar(s3, 'CRITICITA\n&\nMIGLIOR.', d.settimana || 'W—');

  s3.addText('PROGETTO', { x:0.2,y:2.5,w:2.3,h:0.2, color:LIME, fontSize:7, bold:true, fontFace:'Calibri', charSpacing:2 });
  s3.addText(d.nomeProgetto||'—', { x:0.2,y:2.72,w:2.3,h:0.5, color:WHITE, fontSize:11, fontFace:'Calibri', wrap:true });

  s3.addShape(pptx.ShapeType.rect, { x:2.8,y:0,w:10.53,h:0.08, fill:{color:LIME}, line:{color:LIME} });

  // Miglioramenti — top half
  var mx = 3.0; var mw = 10.1; var mh = 3.35;
  s3.addShape(pptx.ShapeType.rect, { x:mx,y:0.2,w:mw,h:mh, fill:{color:WHITE}, line:{color:'D1D9E6',pt:1} });
  s3.addShape(pptx.ShapeType.rect, { x:mx,y:0.2,w:mw,h:0.08, fill:{color:'2E7D32'}, line:{color:'2E7D32'} });
  s3.addShape(pptx.ShapeType.ellipse, { x:mx+0.2,y:0.45,w:0.6,h:0.6, fill:{color:'2E7D32'}, line:{color:'2E7D32'} });
  // Up arrow icon
  s3.addText('/', { x:mx+0.2,y:0.45,w:0.6,h:0.6, color:WHITE, fontSize:14, bold:true, fontFace:'Calibri', align:'center', valign:'middle' });
  s3.addText('AREE DI MIGLIORAMENTO', { x:mx+0.95,y:0.5,w:mw-1.2,h:0.3, color:BRAND, fontSize:9, bold:true, fontFace:'Calibri', charSpacing:1.5 });
  s3.addShape(pptx.ShapeType.rect, { x:mx+0.2,y:1.0,w:mw-0.4,h:0.02, fill:{color:LGRAY}, line:{color:LGRAY} });
  var migl3 = splitList(d.areeMiglioramento);
  migl3.forEach(function(a, i) {
    var ty = 1.16 + i*0.55;
    if (ty > 3.35) return;
    s3.addShape(pptx.ShapeType.rect, { x:mx+0.2,y:ty+0.1,w:0.18,h:0.18, fill:{color:'2E7D32'}, line:{color:'2E7D32'} });
    s3.addText(a, { x:mx+0.5,y:ty,w:mw-0.7,h:0.42, color:DGRAY, fontSize:11, fontFace:'Calibri', wrap:true, valign:'top' });
  });

  // Criticita — bottom half
  var cx3 = 3.0; var ch = 3.35;
  s3.addShape(pptx.ShapeType.rect, { x:cx3,y:3.78,w:mw,h:ch, fill:{color:WHITE}, line:{color:'D1D9E6',pt:1} });
  s3.addShape(pptx.ShapeType.rect, { x:cx3,y:3.78,w:mw,h:0.08, fill:{color:'E6342E'}, line:{color:'E6342E'} });
  s3.addShape(pptx.ShapeType.ellipse, { x:cx3+0.2,y:4.0,w:0.6,h:0.6, fill:{color:'E6342E'}, line:{color:'E6342E'} });
  s3.addText('!', { x:cx3+0.2,y:4.0,w:0.6,h:0.6, color:WHITE, fontSize:16, bold:true, fontFace:'Calibri', align:'center', valign:'middle' });
  s3.addText('CRITICITA E BLOCCHI', { x:cx3+0.95,y:4.05,w:mw-1.2,h:0.3, color:BRAND, fontSize:9, bold:true, fontFace:'Calibri', charSpacing:1.5 });
  s3.addShape(pptx.ShapeType.rect, { x:cx3+0.2,y:4.55,w:mw-0.4,h:0.02, fill:{color:LGRAY}, line:{color:LGRAY} });
  var crit3 = splitList(d.criticita);
  crit3.forEach(function(a, i) {
    var ty = 4.72 + i*0.55;
    if (ty > 6.9) return;
    s3.addShape(pptx.ShapeType.ellipse, { x:cx3+0.2,y:ty+0.1,w:0.18,h:0.18, fill:{color:'E6342E'}, line:{color:'E6342E'} });
    s3.addText(a, { x:cx3+0.5,y:ty,w:mw-0.7,h:0.42, color:DGRAY, fontSize:11, fontFace:'Calibri', wrap:true, valign:'top' });
  });

  addFooter(s3, 4);

  // ── SAVE ────────────────────────────────────────────────────────────────────
  setP(95, 'Salvataggio...'); await wait(200);
  var proj = (d.nomeProgetto||'Progetto').replace(/\s+/g,'_');
  var week = (d.settimana||'W').replace(/\s+/g,'-').replace(/\//g,'');

  try {
    await pptx.writeFile({ fileName: 'WeeklyStatus_' + proj + '_' + week + '.pptx' });
    fill.style.width = '100%';
    lbl.textContent = 'Completato!';
    await wait(400);
    prog.style.display = 'none';
    title.textContent = 'Download completato!';
    sub.textContent = 'File: WeeklyStatus_' + proj + '_' + week + '.pptx';
    btn.textContent = 'Scarica di nuovo';
    btn.disabled = false;
  } catch(e) {
    prog.style.display = 'none';
    title.textContent = 'Errore nella generazione';
    btn.textContent = 'Riprova';
    btn.disabled = false;
    err.textContent = 'Errore: ' + e.message;
    err.style.display = 'block';
  }
}

</script>
